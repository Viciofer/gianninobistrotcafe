name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Determine deployment directory
        id: determine_dir
        run: |
          if [ -d ".output/public" ]; then
            echo "path=.output/public" >> $GITHUB_OUTPUT
          elif [ -d "dist" ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          else
            echo "Could not find build output directory (.output/public or dist)"
            exit 1
          fi

      - name: Add .nojekyll
        run: touch ./${{ steps.determine_dir.outputs.path }}/.nojekyll

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ steps.determine_dir.outputs.path }}

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
