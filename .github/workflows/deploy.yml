name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Debug Output
        run: |
          echo "Listing root directory:"
          ls -F
          echo "Searching for index.html:"
          find . -name "index.html"

      - name: Prepare Artifact
        run: |
          CP_PATH="dist/client"
          
          if [ ! -f "$CP_PATH/index.html" ]; then
            echo "index.html not found! Generating dynamically based on assets..."
            mkdir -p $CP_PATH
            JS_FILE=$(ls $CP_PATH/assets | grep "^index-.*\.js$" | head -n 1)
            CSS_FILE=$(ls $CP_PATH/assets | grep "^styles-.*\.css$" | head -n 1 || true)
            
            CSS_LINK=""
            if [ ! -z "$CSS_FILE" ]; then
              CSS_LINK="<link rel=\"stylesheet\" href=\"/gianninobistrotcafe/assets/$CSS_FILE\">"
            fi
            
            cat <<EOF > $CP_PATH/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Giannino Bistrot Cafè — Gestionale</title>
            <meta name="description" content="Sistema gestionale del ristorante Giannino Bistrot Cafè: storia, menù, carta dei vini, drink list e contatti." />
            $CSS_LINK
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="/gianninobistrotcafe/assets/$JS_FILE"></script>
          </body>
          </html>
          EOF
          fi
          
          echo "DEPLOY_PATH=$CP_PATH" >> $GITHUB_ENV
          touch ./$CP_PATH/.nojekyll
          # Copy index.html to 404.html for SPA routing
          cp ./$CP_PATH/index.html ./$CP_PATH/404.html

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ env.DEPLOY_PATH }}

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
